<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>District Admin | NILP Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-indigo-900 text-white shadow-md z-10 p-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold">NILP Secure Admin</h1>
            <p class="text-xs text-indigo-300" id="admin-district-badge">District Scope: ALL</p>
        </div>
        <div class="flex items-center gap-4">
            <button id="btn-export-csv" class="hidden bg-emerald-600 hover:bg-emerald-700 px-4 py-2 rounded text-sm font-bold shadow transition-colors">
                <i class="fa-solid fa-file-csv mr-2"></i> Export CSV
            </button>
            <div id="auth-status" class="text-sm font-bold bg-indigo-800 px-3 py-1.5 rounded-full border border-indigo-700 shadow-inner">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Connecting...
            </div>
        </div>
    </header>

    <!-- Main Interface -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- Sidebar Controls -->
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col overflow-y-auto">
            
            <!-- 1. Authentication Layer -->
            <div id="auth-panel" class="p-6 border-b border-slate-100">
                <h3 class="font-bold text-slate-800 mb-4 text-sm uppercase tracking-wider">Admin Login</h3>
                <input type="password" id="admin-pin" placeholder="Enter Admin PIN" class="w-full p-2 border border-slate-300 rounded mb-3 text-center tracking-widest font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                <button id="btn-login" class="w-full bg-slate-800 hover:bg-slate-900 text-white p-2 rounded font-bold shadow">Unlock Data</button>
                <p id="login-error" class="text-red-500 text-xs mt-2 text-center hidden font-medium">Incorrect PIN</p>
            </div>

            <!-- 2. Filters Layer (Hidden until authenticated) -->
            <div id="filters-panel" class="p-6 hidden flex-1 flex flex-col">
                <h3 class="font-bold text-slate-800 mb-4 text-sm uppercase tracking-wider flex items-center gap-2">
                    <i class="fa-solid fa-filter text-indigo-500"></i> Filters
                </h3>
                
                <div class="mb-4">
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Select District</label>
                    <select id="filter-district" class="w-full p-2 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50">
                        <option value="ALL">Show All Odisha</option>
                        <!-- Populated dynamically -->
                    </select>
                </div>

                <div class="mb-6">
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Search Block/Cluster/School</label>
                    <input type="text" id="filter-search" placeholder="Type to search..." class="w-full p-2 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>

                <div class="mt-auto bg-indigo-50 border border-indigo-100 p-4 rounded-lg">
                    <p class="text-xs text-indigo-800 font-semibold mb-1">Total Found</p>
                    <p class="text-2xl font-black text-indigo-900" id="stat-count">0</p>
                    <p class="text-[10px] text-indigo-600 uppercase tracking-widest mt-1">Teachers</p>
                </div>
            </div>
        </aside>

        <!-- Data Table Area -->
        <main class="flex-1 bg-slate-50 p-6 overflow-hidden flex flex-col relative">
            
            <!-- Locked Overlay -->
            <div id="locked-overlay" class="absolute inset-0 bg-slate-100/80 backdrop-blur-sm z-20 flex flex-col items-center justify-center">
                <i class="fa-solid fa-lock text-5xl text-slate-400 mb-4"></i>
                <p class="text-slate-500 font-medium">Please enter your PIN in the sidebar to access secure records.</p>
            </div>

            <!-- Loading Spinner -->
            <div id="loading-spinner" class="hidden absolute inset-0 bg-white/50 backdrop-blur-[2px] z-10 flex flex-col items-center justify-center">
                <div class="w-10 h-10 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
            </div>

            <div class="bg-white border border-slate-200 rounded-xl shadow-sm flex-1 flex flex-col overflow-hidden">
                <div class="overflow-x-auto flex-1">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead class="bg-slate-100 text-slate-600 sticky top-0 z-10 shadow-sm">
                            <tr>
                                <th class="p-4 font-bold border-b border-slate-200">Teacher Name</th>
                                <th class="p-4 font-bold border-b border-slate-200">Phone</th>
                                <th class="p-4 font-bold border-b border-slate-200">District</th>
                                <th class="p-4 font-bold border-b border-slate-200">School / UDISE</th>
                                <th class="p-4 font-bold border-b border-slate-200 text-center">Enrolled</th>
                                <th class="p-4 font-bold border-b border-slate-200 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-slate-100">
                            <!-- Rows injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Image Preview Modal -->
    <div id="modal-details" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-800">Evidence Documents</h3>
                <button class="close-details text-slate-400 hover:text-slate-700 bg-white shadow-sm w-8 h-8 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto" id="details-content">
                <!-- Injected images -->
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, deleteDoc, writeBatch, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'nlp-odisha';
        
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyD3HN5SCXq0dQ94wP73PHTJdwjNVAJOJm8",
                authDomain: "livequizapp-5e433.firebaseapp.com",
                databaseURL: "https://livequizapp-5e433-default-rtdb.firebaseio.com",
                projectId: "livequizapp-5e433",
                storageBucket: "livequizapp-5e433.firebasestorage.app",
                messagingSenderId: "393541118458",
                appId: "1:393541118458:web:76620000b8f08e87561c43"
            };

        let db, auth;
        let isAuth = false;
        let adminRole = null; // 'SUPER' or specific 'DISTRICT_NAME'
        let unsubscribeData = null;
        let districtNominations = []; // Holds the live array of documents

        const odishaDistricts = {
            "ANGUL": "Angul", "BALANGIR": "Balangir", "BALASORE": "Balasore", 
            "BARGARH": "Bargarh", "BHADRAK": "Bhadrak", "BOUDH": "Boudh", 
            "CUTTACK": "Cuttack", "DEOGARH": "Deogarh", "DHENKANAL": "Dhenkanal", 
            "GAJAPATI": "Gajapati", "GANJAM": "Ganjam", "JAGATSINGHPUR": "Jagatsinghpur", 
            "JAJPUR": "Jajpur", "JHARSUGUDA": "Jharsuguda", "KALAHANDI": "Kalahandi", 
            "KANDHAMAL": "Kandhamal", "KENDRAPARA": "Kendrapara", "KEONJHAR": "Keonjhar", 
            "KHORDHA": "Khordha", "KORAPUT": "Koraput", "MALKANGIRI": "Malkangiri", 
            "MAYURBHANJ": "Mayurbhanj", "NABARANGPUR": "Nabarangpur", "NAYAGARH": "Nayagarh", 
            "NUAPADA": "Nuapada", "PURI": "Puri", "RAYAGADA": "Rayagada", 
            "SAMBALPUR": "Sambalpur", "SUBARNAPUR": "Subarnapur", "SUNDARGARH": "Sundargarh"
        };

        // Initialize Firebase
        async function init() {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
                
                document.getElementById('auth-status').innerHTML = `<i class="fa-solid fa-wifi"></i> Connected`;
                document.getElementById('auth-status').classList.replace('bg-indigo-800', 'bg-emerald-600');
                document.getElementById('auth-status').classList.replace('border-indigo-700', 'border-emerald-500');
                
                populateFilterDropdown();
            } catch (e) {
                console.error(e);
                document.getElementById('auth-status').innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Error`;
                document.getElementById('auth-status').classList.replace('bg-indigo-800', 'bg-red-600');
            }
        }

        function populateFilterDropdown() {
            const select = document.getElementById('filter-district');
            Object.keys(odishaDistricts).sort().forEach(key => {
                select.add(new Option(odishaDistricts[key], key));
            });
        }

        // Hardcoded secure access mechanism for prototype
        document.getElementById('btn-login').addEventListener('click', () => {
            const pin = document.getElementById('admin-pin').value.trim();
            const err = document.getElementById('login-error');
            
            // DEMO PINS: 'ADMIN123' for full access. In production, fetch this from a secure 'admin_roles' collection.
            if (pin === 'ADMIN123') {
                adminRole = 'SUPER';
                err.classList.add('hidden');
                unlockDashboard();
            } else if (pin.startsWith('OD') && pin.length === 6) {
                 // Demo District Pin (e.g., ODPURI)
                 const distCode = pin.replace('OD', '');
                 const distName = Object.keys(odishaDistricts).find(d => d.includes(distCode));
                 
                 if(distName) {
                     adminRole = distName;
                     err.classList.add('hidden');
                     unlockDashboard();
                 } else { err.classList.remove('hidden'); }
            } else { err.classList.remove('hidden'); }
        });

        function unlockDashboard() {
            document.getElementById('auth-panel').classList.add('hidden');
            document.getElementById('filters-panel').classList.remove('hidden');
            document.getElementById('locked-overlay').classList.add('hidden');
            document.getElementById('btn-export-csv').classList.remove('hidden');
            
            document.getElementById('admin-district-badge').textContent = `Scope: ${adminRole}`;
            
            // If district admin, lock the dropdown
            const distSelect = document.getElementById('filter-district');
            if (adminRole !== 'SUPER') {
                distSelect.value = adminRole;
                distSelect.disabled = true;
                distSelect.classList.add('opacity-50', 'cursor-not-allowed');
            }

            fetchLiveAdminData();
        }

        function fetchLiveAdminData() {
            document.getElementById('loading-spinner').classList.remove('hidden');
            if (unsubscribeData) unsubscribeData();

            let q;
            const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'nominations');
            
            if (adminRole !== 'SUPER') {
                // Limit read to only their district
                q = query(collectionRef, where('district', '==', adminRole));
            } else {
                // Super admin sees all, or whatever is selected in dropdown
                const selectedDist = document.getElementById('filter-district').value;
                if(selectedDist === 'ALL') {
                    q = query(collectionRef); // Entire state (Requires index or limits in prod)
                } else {
                    q = query(collectionRef, where('district', '==', selectedDist));
                }
            }

            // Real-time listener
            unsubscribeData = onSnapshot(q, (snapshot) => {
                districtNominations = [];
                snapshot.forEach(doc => {
                    districtNominations.push({ id: doc.id, ...doc.data() });
                });
                // Sort by highest enrollment
                districtNominations.sort((a, b) => b.learnersEnrolled - a.learnersEnrolled);
                renderTable();
                document.getElementById('loading-spinner').classList.add('hidden');
            }, (error) => {
                console.error("Listener error:", error);
                alert("Error fetching secure data.");
                document.getElementById('loading-spinner').classList.add('hidden');
            });
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            const searchTerms = document.getElementById('filter-search').value.toLowerCase();
            
            tbody.innerHTML = '';
            let count = 0;

            districtNominations.forEach(nom => {
                // Search filter logic
                const searchString = `${nom.schoolName} ${nom.block} ${nom.cluster} ${nom.udiseCode} ${nom.teacherName}`.toLowerCase();
                if (searchTerms && !searchString.includes(searchTerms)) return;

                count++;
                const tr = document.createElement('tr');
                tr.className = "hover:bg-indigo-50/40 transition-colors group";
                
                tr.innerHTML = `
                    <td class="p-4 border-b border-slate-100">
                        <div class="font-bold text-slate-800">${nom.teacherName}</div>
                        <div class="text-[10px] text-slate-400 font-mono">PIN: ${nom.securityPin}</div>
                    </td>
                    <td class="p-4 border-b border-slate-100 font-medium text-slate-600">${nom.phone}</td>
                    <td class="p-4 border-b border-slate-100">
                        <span class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-xs font-bold">${odishaDistricts[nom.district] || nom.district}</span>
                    </td>
                    <td class="p-4 border-b border-slate-100">
                        <div class="text-sm font-semibold text-slate-700 truncate max-w-[200px]" title="${nom.schoolName}">${nom.schoolName}</div>
                        <div class="text-[11px] text-slate-500">${nom.block} | UDISE: <span class="font-mono">${nom.udiseCode}</span></div>
                    </td>
                    <td class="p-4 border-b border-slate-100 text-center">
                        <span class="text-lg font-black text-emerald-600">${nom.learnersEnrolled}</span>
                    </td>
                    <td class="p-4 border-b border-slate-100 text-right">
                        <button onclick="window.view('${nom.id}')" class="text-indigo-600 hover:text-indigo-900 bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded mr-2 transition-colors">
                            <i class="fa-solid fa-eye"></i> View Docs
                        </button>
                        <button onclick="window.del('${nom.id}')" class="text-red-600 hover:text-red-900 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded transition-colors opacity-50 hover:opacity-100">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('stat-count').textContent = count;
        }

        // Event Listeners for Filters
        document.getElementById('filter-district').addEventListener('change', () => {
            if(adminRole === 'SUPER') fetchLiveAdminData();
        });
        document.getElementById('filter-search').addEventListener('input', renderTable);

        // Global functions for inline HTML buttons
        window.view = (id) => {
            const nom = districtNominations.find(n => n.id === id);
            document.getElementById('details-content').innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div><p class="font-bold mb-2">Teacher Photo:</p><img src="${nom.photoUrl}" class="w-48 h-48 object-cover rounded shadow border" onerror="this.src='https://placehold.co/400x400/e2e8f0/94a3b8?text=No+Photo'"></div>
                    <div><p class="font-bold mb-2">App Screenshot (Proof):</p><img src="${nom.proofUrl}" class="w-full rounded shadow border" onerror="this.src='https://placehold.co/600x800/e2e8f0/94a3b8?text=Image+Missing'"></div>
                </div>
            `;
            document.getElementById('modal-details').classList.remove('hidden');
        };
        document.querySelector('.close-details').onclick = () => document.getElementById('modal-details').classList.add('hidden');

        // NEW LOGIC: Batch delete teacher and reverse district counts
        window.del = async (id) => {
            if(confirm("Permanently delete this entry? This will also reverse the scoreboard counts.")) {
                try {
                    const nom = districtNominations.find(n => n.id === id);
                    if (!nom) return;

                    const batch = writeBatch(db);

                    // 1. Delete the teacher record
                    batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'nominations', id));

                    // 2. Reduce the district aggregates
                    const distRef = doc(db, 'artifacts', appId, 'public', 'data', 'lb_districts', nom.district);
                    batch.update(distRef, {
                        teacherCount: increment(-1),
                        totalEnrolled: increment(-nom.learnersEnrolled)
                    });

                    await batch.commit();
                } catch (err) {
                    console.error("Deletion error: ", err);
                    alert("Failed to delete. Please try again.");
                }
            }
        };

        // Export to CSV Function
        document.getElementById('btn-export-csv').addEventListener('click', () => {
            if(districtNominations.length === 0) { alert("No data to export."); return; }
            
            const headers = ["Teacher Name", "Phone", "District", "Block", "Cluster", "School Name", "UDISE Code", "Learners Enrolled", "Photo URL", "Proof URL"];
            let csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n";
            
            districtNominations.forEach(row => {
                const values = [
                    `"${row.teacherName}"`,
                    `"${row.phone}"`,
                    `"${row.district}"`,
                    `"${row.block}"`,
                    `"${row.cluster}"`,
                    `"${row.schoolName}"`,
                    `"${row.udiseCode}"`,
                    row.learnersEnrolled,
                    `"${row.photoUrl}"`,
                    `"${row.proofUrl}"`
                ];
                csvContent += values.join(",") + "\n";
            });
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `NILP_Export_${adminRole}_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
